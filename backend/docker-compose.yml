version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: floweng-db
    environment:
      POSTGRES_USER: floweng
      POSTGRES_PASSWORD: floweng
      POSTGRES_DB: floweng
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
